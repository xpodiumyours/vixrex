<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Vixrex Asistan — SaaS Örnek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #e8eef2;
      --muted: #7d93a3;
      --line: rgba(255, 255, 255, 0.09);
      --panel: #101820;
      --panel-2: #15202a;
      --bubble: #17232d;
      --user: #13343c;
      --accent: #00e8f0;
      --accent-2: #00b8c4;
      --ok: #3dd68c;
      --warn: #f0b429;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      --radius: 16px;
      --font: "DM Sans", system-ui, sans-serif;
      --display: Syne, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(ellipse 70% 45% at 50% -5%, rgba(0, 232, 240, 0.1), transparent 50%),
        radial-gradient(ellipse 40% 30% at 90% 80%, rgba(0, 100, 120, 0.12), transparent 45%),
        #070b0f;
    }

    /* SaaS stage: product frame around the phone */
    .stage {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 28px 16px 36px;
      gap: 20px;
    }

    .stage-label {
      text-align: center;
      max-width: 420px;
    }
    .stage-label .brand {
      font-family: var(--display);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .stage-label h1 {
      margin: 0 0 6px;
      font-family: var(--display);
      font-size: clamp(1.35rem, 3vw, 1.7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .stage-label p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .device {
      width: min(400px, 100%);
      height: min(780px, calc(100dvh - 140px));
      min-height: 560px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #0c1319 0%, #0a1015 100%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .topbar {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(16, 24, 32, 0.92);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .topbar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-family: var(--display);
      font-weight: 800;
      font-size: 13px;
      color: #041016;
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 24px rgba(0, 232, 240, 0.25);
    }
    .top-meta strong {
      display: block;
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
    }
    .top-meta span {
      font-size: 12px;
      color: var(--muted);
    }
    .live {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      color: var(--ok);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(61, 214, 140, 0.1);
      border: 1px solid rgba(61, 214, 140, 0.2);
    }
    .live i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 8px var(--ok);
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 12px;
    }
    .progress span {
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      transition: background 0.25s;
    }
    .progress span.on {
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
    }
    .progress-caption {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .row {
      display: flex;
      gap: 8px;
      max-width: 94%;
      animation: in 0.32s ease;
    }
    .row.bot { align-self: flex-start; }
    .row.user { align-self: flex-end; flex-direction: row-reverse; }

    .face {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      flex-shrink: 0;
      margin-top: 2px;
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 800;
      font-family: var(--display);
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
      color: #041016;
    }

    .bubble {
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .row.bot .bubble {
      background: var(--bubble);
      border: 1px solid var(--line);
      border-top-left-radius: 6px;
    }
    .row.user .bubble {
      background: var(--user);
      border: 1px solid rgba(0, 232, 240, 0.2);
      border-top-right-radius: 6px;
    }

    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 4px 2px;
    }
    .typing i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing i:nth-child(2) { animation-delay: 0.15s; }
    .typing i:nth-child(3) { animation-delay: 0.3s; }

    /* Product surface: storefront preview */
    .surface {
      margin-top: 10px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    .surface-cover {
      height: 96px;
      position: relative;
      background:
        linear-gradient(160deg, rgba(0,232,240,0.12), transparent 55%),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0 6px, transparent 6px 12px),
        #1a2731;
      display: grid;
      place-items: center;
    }
    .surface-cover.filled {
      background-size: cover;
      background-position: center;
    }
    .surface-cover .placeholder {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .surface-body { padding: 12px 12px 14px; }
    .surface-body h3 {
      margin: 0 0 2px;
      font-family: var(--display);
      font-size: 16px;
      font-weight: 700;
    }
    .surface-body .sub {
      margin: 0 0 10px;
      font-size: 12.5px;
      color: var(--muted);
    }
    .metric {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .metric-bar {
      flex: 1;
      height: 6px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .metric-bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      transition: width 0.45s ease;
    }
    .metric b {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      min-width: 34px;
      text-align: right;
    }
    .link-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .link-box {
      flex: 1;
      font-size: 11.5px;
      padding: 9px 10px;
      border-radius: 10px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--accent);
      word-break: break-all;
      line-height: 1.35;
    }
    .copy-btn {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: rgba(0,232,240,0.4); color: var(--accent); }

    .trust {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .trust span {
      font-size: 11px;
      color: var(--muted);
      padding: 5px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
    }

    .tpl-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .tpl {
      border: 1.5px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: var(--panel-2);
      padding: 0;
      font-family: inherit;
      color: inherit;
      text-align: left;
      transition: border-color 0.15s, transform 0.15s;
    }
    .tpl:hover { transform: translateY(-2px); border-color: rgba(0,232,240,0.35); }
    .tpl.on { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(0,232,240,0.25); }
    .tpl .swatch { height: 54px; }
    .tpl .lbl {
      padding: 7px 8px 8px;
      font-size: 11px;
      font-weight: 600;
    }
    .tpl:nth-child(1) .swatch { background: linear-gradient(155deg, #1f4a3c, #0c1a16); }
    .tpl:nth-child(2) .swatch { background: linear-gradient(155deg, #3a2f1f, #16110c); }
    .tpl:nth-child(3) .swatch { background: linear-gradient(155deg, #1f3348, #0c141c); }

    .composer {
      border-top: 1px solid var(--line);
      padding: 12px 14px 16px;
      background: rgba(16, 24, 32, 0.96);
      flex-shrink: 0;
    }
    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .quick button, .primary {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      font-weight: 650;
      font-size: 13.5px;
      border-radius: 12px;
      min-height: 44px;
      padding: 11px 14px;
    }
    .quick .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #041016;
      box-shadow: 0 8px 24px rgba(0, 232, 240, 0.18);
    }
    .quick .ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .input-row {
      display: none;
      gap: 8px;
      margin-top: 2px;
    }
    .input-row.show { display: flex; }
    .input-row input {
      flex: 1;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bubble);
      color: var(--ink);
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
    }
    .input-row input:focus {
      border-color: rgba(0, 232, 240, 0.45);
      box-shadow: 0 0 0 3px rgba(0, 232, 240, 0.1);
    }
    .input-row .primary { padding-inline: 16px; }

    .loc-tools {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .loc-tools.show { display: flex; }
    .gps-btn {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1.5px solid rgba(0, 232, 240, 0.55);
      background: transparent;
      color: var(--accent);
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .gps-btn:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    .gps-btn .spin {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0, 232, 240, 0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loc-status {
      margin: 0;
      font-size: 11.5px;
      color: var(--muted);
      text-align: center;
      min-height: 1.2em;
    }
    .loc-status.err { color: #ff8f8f; }

    .hint {
      margin: 8px 0 0;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; }
      40% { opacity: 1; }
    }

    @media (max-width: 520px) {
      .stage { padding: 0; place-items: stretch; }
      .stage-label { display: none; }
      .device {
        width: 100%;
        height: 100dvh;
        min-height: 100dvh;
        border-radius: 0;
        border: 0;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="stage-label">
      <div class="brand">Vixrex · Product preview</div>
      <h1>Asistan kurulum deneyimi</h1>
      <p>Kısa sohbet → zorunlu 3 bilgi → dijital varlık → link → şablon kapak.</p>
    </div>

    <div class="device" role="application" aria-label="Vixrex asistan örneği">
      <div class="topbar">
        <div class="topbar-row">
          <div class="logo">Vx</div>
          <div class="top-meta">
            <strong>Vixrex</strong>
            <span>Dijital vitrin asistanı</span>
          </div>
          <div class="live"><i></i>Aktif</div>
        </div>
        <div class="progress" id="progress" aria-hidden="true">
          <span class="on"></span><span></span><span></span><span></span>
        </div>
        <div class="progress-caption" id="progressCap">Tanışma</div>
      </div>

      <div id="chat" aria-live="polite"></div>

      <div class="composer">
        <div class="quick" id="quick"></div>
        <div class="input-row" id="inputRow">
          <input id="field" type="text" autocomplete="organization" />
          <button class="primary" type="button" id="sendBtn">Gönder</button>
        </div>
        <div class="loc-tools" id="locTools">
          <button type="button" class="gps-btn" id="gpsBtn">📡 GPS ile Konumumu Al</button>
          <p class="loc-status" id="locStatus"></p>
        </div>
        <p class="hint">Örnek arayüz · gerçek hesap oluşturmaz</p>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const quick = document.getElementById("quick");
    const inputRow = document.getElementById("inputRow");
    const field = document.getElementById("field");
    const sendBtn = document.getElementById("sendBtn");
    const progress = document.getElementById("progress");
    const progressCap = document.getElementById("progressCap");
    const locTools = document.getElementById("locTools");
    const gpsBtn = document.getElementById("gpsBtn");
    const locStatus = document.getElementById("locStatus");

    let locationSubmit = null;

    function hideLocTools() {
      locTools.classList.remove("show");
      locStatus.textContent = "";
      locStatus.classList.remove("err");
      gpsBtn.disabled = false;
      gpsBtn.innerHTML = "📡 GPS ile Konumumu Al";
      locationSubmit = null;
    }

    function showLocTools(onGot) {
      locTools.classList.add("show");
      locStatus.textContent = "İzin verince konumunu doldururuz. İstersen elle de yazabilirsin.";
      locStatus.classList.remove("err");
      locationSubmit = onGot;
    }

    async function reverseGeocode(lat, lon) {
      const url =
        `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=tr`;
      const res = await fetch(url, {
        headers: { Accept: "application/json" },
      });
      if (!res.ok) throw new Error("Adres çözülemedi");
      const data = await res.json();
      const a = data.address || {};
      const district =
        a.suburb || a.neighbourhood || a.city_district || a.town || a.county || "";
      const city = a.city || a.province || a.state || a.town || "";
      const road = [a.road, a.house_number].filter(Boolean).join(" ");
      const parts = [district, city].filter(Boolean);
      let label = parts.join(", ");
      if (road) label = `${label} — ${road}`;
      if (!label) label = data.display_name || `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      return label;
    }

    gpsBtn.addEventListener("click", async () => {
      if (!locationSubmit) return;
      if (!navigator.geolocation) {
        locStatus.textContent = "Bu tarayıcı konum desteklemiyor. Adresi yazabilirsin.";
        locStatus.classList.add("err");
        return;
      }
      gpsBtn.disabled = true;
      gpsBtn.innerHTML = `<span class="spin"></span> Konum alınıyor...`;
      locStatus.classList.remove("err");
      locStatus.textContent = "Konum izni isteniyor…";

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const submit = locationSubmit;
          try {
            locStatus.textContent = "Adres bulunuyor…";
            const label = await reverseGeocode(
              pos.coords.latitude,
              pos.coords.longitude
            );
            field.value = label;
            locStatus.textContent = "Konum bulundu.";
            gpsBtn.disabled = false;
            gpsBtn.innerHTML = "📡 GPS ile Konumumu Al";
            if (submit) {
              hideLocTools();
              submit(label);
            }
          } catch (e) {
            const fallback =
              `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
            field.value = fallback;
            locStatus.textContent =
              "Koordinat alındı; adres çözülemedi. Düzenleyip Gönder’e bas.";
            locStatus.classList.add("err");
            gpsBtn.disabled = false;
            gpsBtn.innerHTML = "📡 GPS ile Konumumu Al";
          }
        },
        (err) => {
          gpsBtn.disabled = false;
          gpsBtn.innerHTML = "📡 GPS ile Konumumu Al";
          locStatus.classList.add("err");
          if (err.code === 1) {
            locStatus.textContent =
              "Konum izni reddedildi. Adresi elle yazabilirsin.";
          } else if (err.code === 2) {
            locStatus.textContent =
              "Konum alınamadı. Cihaz konumunu açıp tekrar dene.";
          } else {
            locStatus.textContent =
              "Konum zaman aşımı. Tekrar dene veya adresi yaz.";
          }
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
      );
    });

    const state = {
      phase: 0,
      name: "",
      whatsapp: "",
      location: "",
      slug: "",
      cover: null,
      quality: 35,
    };

    const phases = ["Tanışma", "Bilgiler", "Vitrinin hazır", "Kapak seçimi"];

    function setPhase(i) {
      state.phase = i;
      [...progress.children].forEach((el, idx) => {
        el.classList.toggle("on", idx <= i);
      });
      progressCap.textContent = phases[i] || "";
    }

    function slugify(name) {
      return name
        .toLocaleLowerCase("tr-TR")
        .replace(/ğ/g, "g").replace(/ü/g, "u").replace(/ş/g, "s")
        .replace(/ı/g, "i").replace(/ö/g, "o").replace(/ç/g, "c")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "") || "isletmen";
    }

    function esc(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function addBot(html) {
      const row = document.createElement("div");
      row.className = "row bot";
      row.innerHTML = `<div class="face">Vx</div><div class="bubble">${html}</div>`;
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function addUser(text) {
      const row = document.createElement("div");
      row.className = "row user";
      row.innerHTML = `<div class="bubble"></div>`;
      row.querySelector(".bubble").textContent = text;
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping(ms = 650) {
      return new Promise((resolve) => {
        const row = document.createElement("div");
        row.className = "row bot";
        row.id = "typing";
        row.innerHTML = `<div class="face">Vx</div><div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>`;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
        setTimeout(() => {
          row.remove();
          resolve();
        }, ms);
      });
    }

    async function botSay(html, ms = 550) {
      await showTyping(ms);
      addBot(html);
    }

    function setQuick(buttons) {
      quick.innerHTML = "";
      inputRow.classList.remove("show");
      hideLocTools();
      buttons.forEach((b) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = b.ghost ? "ghost" : "primary";
        btn.textContent = b.label;
        btn.addEventListener("click", () => b.onClick());
        quick.appendChild(btn);
      });
    }

    function askText(placeholder, onSubmit, { withGps = false } = {}) {
      quick.innerHTML = "";
      inputRow.classList.add("show");
      field.value = "";
      field.placeholder = placeholder;
      field.focus();
      if (withGps) {
        showLocTools(onSubmit);
      } else {
        hideLocTools();
      }
      const go = () => {
        const v = field.value.trim();
        if (!v) return;
        hideLocTools();
        onSubmit(v);
      };
      sendBtn.onclick = go;
      field.onkeydown = (e) => { if (e.key === "Enter") go(); };
    }

    function surfaceHtml() {
      const coverClass = state.cover ? "surface-cover filled" : "surface-cover";
      const coverStyle = state.cover
        ? `style="background-image:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.45)),${state.cover}"`
        : "";
      const coverInner = state.cover ? "" : `<span class="placeholder">Kapak bekleniyor</span>`;
      const url = `vixrex-public.vercel.app/v/${esc(state.slug)}`;
      return `
        <div class="surface">
          <div class="${coverClass}" ${coverStyle}>${coverInner}</div>
          <div class="surface-body">
            <h3>${esc(state.name)}</h3>
            <p class="sub">${esc(state.location)}</p>
            <div class="metric" title="Vitrin doluluk">
              <div class="metric-bar"><i style="width:${state.quality}%"></i></div>
              <b>%${state.quality}</b>
            </div>
            <div class="link-row">
              <div class="link-box" id="linkBox">${url}</div>
              <button type="button" class="copy-btn" id="copyLink">Kopyala</button>
            </div>
            <div class="trust">
              <span>Domain ücretsiz</span>
              <span>WhatsApp hazır</span>
              <span>SEO sayfası</span>
            </div>
          </div>
        </div>`;
    }

    function wireCopy() {
      const btn = document.getElementById("copyLink");
      const box = document.getElementById("linkBox");
      if (!btn || !box) return;
      btn.onclick = async () => {
        try {
          await navigator.clipboard.writeText("https://" + box.textContent.trim());
          btn.textContent = "Kopyalandı";
          setTimeout(() => { btn.textContent = "Kopyala"; }, 1400);
        } catch {
          btn.textContent = "Seçildi";
        }
      };
    }

    function restart() {
      chat.innerHTML = "";
      Object.assign(state, {
        phase: 0, name: "", whatsapp: "", location: "", slug: "", cover: null, quality: 35,
      });
      start();
    }

    async function start() {
      setPhase(0);
      await botSay("Merhaba, ben Vixrex.\n\nSana dijital bir vitrin oluşturmamı ister misin?");
      setQuick([
        {
          label: "Evet, oluşturalım",
          onClick: async () => {
            addUser("Evet, oluşturalım");
            setPhase(1);
            await askName();
          },
        },
        {
          label: "Şimdilik bakınıyorum",
          ghost: true,
          onClick: async () => {
            addUser("Şimdilik bakınıyorum");
            await botSay("Tamam. Hazır olunca buradayım.");
            setQuick([{ label: "Baştan başla", ghost: true, onClick: restart }]);
          },
        },
      ]);
    }

    async function askName() {
      await botSay("Harika. İşletmenin adı ne?");
      askText("Örn: Demir Fırın", async (v) => {
        state.name = v;
        state.slug = slugify(v);
        addUser(v);
        await askWhatsapp();
      });
    }

    async function askWhatsapp() {
      await botSay("Müşteriler seni nasıl bulsun?\nWhatsApp numaranı yaz.");
      askText("05xx xxx xx xx", async (v) => {
        state.whatsapp = v;
        addUser(v);
        await askLocation();
      });
    }

    async function askLocation() {
      await botSay(
        "İşletmen nerede?\nGPS ile konumunu alabilirsin — ya da şehir, ilçe ve kısa adresi yaz."
      );
      askText(
        "Örn: Kadıköy, İstanbul",
        async (v) => {
          state.location = v;
          addUser(v);
          await softLegal();
        },
        { withGps: true }
      );
    }

    async function softLegal() {
      await botSay("Son bir onay: yayın için kullanım şartlarını kabul etmen yeterli.\nKısa tutuyoruz.");
      setQuick([
        {
          label: "Kabul ediyorum, devam",
          onClick: async () => {
            addUser("Kabul ediyorum, devam");
            await reveal();
          },
        },
      ]);
    }

    async function reveal() {
      setPhase(2);
      state.quality = 45;
      await botSay(
        "İşte bu kadar.\nArtık dijitalde varsın." +
          surfaceHtml() +
          "\n\nİşletme adına özel linkin hazır. Web siten var — domain masrafın yok."
      );
      wireCopy();
      setQuick([
        {
          label: "Kapak şablonlarına bak",
          onClick: async () => {
            addUser("Kapak şablonlarına bak");
            await offerTemplates();
          },
        },
        {
          label: "Şimdilik böyle kalsın",
          ghost: true,
          onClick: async () => {
            addUser("Şimdilik böyle kalsın");
            await botSay("Tamam. İstediğin zaman kapak seçip vitrini güçlendirebilirsin.\nYavaş yavaş ilerleriz.");
            setQuick([{ label: "Baştan izle", ghost: true, onClick: restart }]);
          },
        },
      ]);
    }

    async function offerTemplates() {
      setPhase(3);
      await botSay(
        "Hazır şablonlardan bir kapak seç.\nVitrinin daha görünür ve kaliteli olsun." +
          `<div class="tpl-grid" id="tpls">
            <button type="button" class="tpl" data-bg="linear-gradient(155deg,#1f4a3c,#0c1a16)"><div class="swatch"></div><div class="lbl">Atölye</div></button>
            <button type="button" class="tpl" data-bg="linear-gradient(155deg,#3a2f1f,#16110c)"><div class="swatch"></div><div class="lbl">Kafe</div></button>
            <button type="button" class="tpl" data-bg="linear-gradient(155deg,#1f3348,#0c141c)"><div class="swatch"></div><div class="lbl">Butik</div></button>
          </div>`
      );
      setQuick([]);
      document.querySelectorAll("#tpls .tpl").forEach((el) => {
        el.addEventListener("click", async () => {
          document.querySelectorAll("#tpls .tpl").forEach((x) => x.classList.remove("on"));
          el.classList.add("on");
          state.cover = el.dataset.bg;
          state.quality = 62;
          addUser((el.querySelector(".lbl")?.textContent || "Şablon") + " kapağını seçtim");
          await botSay(
            "Güzel seçim. Profilin bir adım daha güçlendi." +
              surfaceHtml() +
              "\n\nİstersen sonra açıklama veya ürün de ekleriz. Acele yok."
          );
          wireCopy();
          setQuick([{ label: "Baştan izle", ghost: true, onClick: restart }]);
        });
      });
    }

    start();
  </script>
</body>
</html>
