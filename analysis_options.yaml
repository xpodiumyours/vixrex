# VitrinX analiz ayarlari
#
# Stabilizasyon asamasinda sadece Flutter'in varsayilan guvenli lint seti
# kullanilir. Genis stil temizligi daha sonra ayri ve kucuk adimlarla yapilacak.
include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    avoid_print: warning
    deprecated_member_use: ignore
