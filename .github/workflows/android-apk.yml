name: Android APK

on:
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PUBLIC_SITE_URL: https://vixrex-public.vercel.app
  FLUTTER_VERSION: "3.44.4"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify required secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          missing=0
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            SUPABASE_URL \
            SUPABASE_PUBLISHABLE_KEY
          do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            else
              echo "Secret present: $name"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add the missing GitHub Actions secrets, then re-run."
            exit 1
          fi

      - name: Set build number
        id: version
        run: |
          VERSION_VALUE="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          VERSION_NAME="${VERSION_VALUE%%+*}"
          if [ -z "$VERSION_NAME" ]; then
            echo "Could not read version name from pubspec.yaml"
            exit 1
          fi
          BUILD_NUMBER=$((10000 + GITHUB_RUN_NUMBER))
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "## Android APK build"
            echo ""
            echo "- versionName: \`$VERSION_NAME\`"
            echo "- versionCode: \`$BUILD_NUMBER\`"
            echo "- commit: \`$SHORT_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: dart analyze
        run: dart analyze

      - name: Targeted Flutter tests
        run: |
          flutter test \
            test/critical_flow_smoke_test.dart \
            test/architecture_routing_contract_test.dart \
            test/public_site_config_test.dart

      - name: Write release keystore and key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=upload-keystore.jks\n'
          } > android/key.properties

      - name: Build release APK and AAB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          flutter build apk --release \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            --dart-define=PUBLIC_SITE_URL="${{ env.PUBLIC_SITE_URL }}"
          flutter build appbundle --release \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            --dart-define=PUBLIC_SITE_URL="${{ env.PUBLIC_SITE_URL }}"

      - name: Verify AAB certificate signature and report metadata
        run: |
          AAB_SRC="build/app/outputs/bundle/release/app-release.aab"
          test -f "$AAB_SRC"
          CERT_SHA256=$(keytool -printcert -jarfile "$AAB_SRC" | grep "SHA256:" | head -n 1 | tr -d ' ' | cut -d':' -f2 | tr '[:upper:]' '[:lower:]')
          EXPECTED_SHA256="295af3e289e13bc9fea273f224fa7c1fcb1879472790d48ed3eea8239c0ffc24"
          echo "AAB Cert SHA-256: $CERT_SHA256"
          if [ "$CERT_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "ERROR: Upload certificate signature mismatch! Expected $EXPECTED_SHA256 but found $CERT_SHA256"
            exit 1
          fi
          echo "Upload certificate SHA-256 signature verified successfully."
          {
            echo "- Package: \`com.xpodiumyours.vixrex\`"
            echo "- AAB Cert SHA-256: \`$CERT_SHA256\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare artifact files
        run: |
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          AAB_SRC="build/app/outputs/bundle/release/app-release.aab"
          test -f "$APK_SRC"
          test -f "$AAB_SRC"
          sha256sum "$APK_SRC" | tee app-release.apk.sha256
          sha256sum "$AAB_SRC" | tee app-release.aab.sha256
          mkdir -p dist
          cp "$APK_SRC" dist/app-release.apk
          cp app-release.apk.sha256 dist/app-release.apk.sha256
          cp "$AAB_SRC" dist/app-release.aab
          cp app-release.aab.sha256 dist/app-release.aab.sha256

      - name: Upload APK and AAB artifacts
        uses: actions/upload-artifact@v6
        with:
          name: vixrex-android-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}-${{ steps.version.outputs.short_sha }}
          path: |
            dist/app-release.apk
            dist/app-release.apk.sha256
            dist/app-release.aab
            dist/app-release.aab.sha256
          retention-days: 14
          if-no-files-found: error

      - name: Cleanup signing files
        if: always()
        run: |
          rm -f android/key.properties android/app/upload-keystore.jks

