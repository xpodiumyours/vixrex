name: Android APK

on:
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PUBLIC_SITE_URL: https://vixrex-public.vercel.app
  FLUTTER_VERSION: "3.44.4"
  EXPECTED_PACKAGE: com.xpodiumyours.vixrex
  EXPECTED_UPLOAD_CERT_SHA256: 295af3e289e13bc9fea273f224fa7c1fcb1879472790d48ed3eea8239c0ffc24
  BUNDLETOOL_VERSION: "1.18.3"
  BUNDLETOOL_SHA256: a099cfa1543f55593bc2ed16a70a7c67fe54b1747bb7301f37fdfd6d91028e29

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify required secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          missing=0
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            SUPABASE_URL \
            SUPABASE_PUBLISHABLE_KEY
          do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            else
              echo "Secret present: $name"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add the missing GitHub Actions secrets, then re-run."
            exit 1
          fi

      - name: Set build number
        id: version
        run: |
          VERSION_VALUE="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          VERSION_NAME="${VERSION_VALUE%%+*}"
          if [ -z "$VERSION_NAME" ]; then
            echo "Could not read version name from pubspec.yaml"
            exit 1
          fi
          BUILD_NUMBER=$((10000 + GITHUB_RUN_NUMBER))
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "## Android APK/AAB build"
            echo ""
            echo "- versionName: \`$VERSION_NAME\`"
            echo "- versionCode: \`$BUILD_NUMBER\`"
            echo "- commit: \`$SHORT_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: dart analyze
        run: dart analyze

      - name: Targeted Flutter tests
        run: |
          flutter test \
            test/critical_flow_smoke_test.dart \
            test/architecture_routing_contract_test.dart \
            test/public_site_config_test.dart \
            test/android_apk_workflow_contract_test.dart

      - name: Write release keystore and key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=upload-keystore.jks\n'
          } > android/key.properties

      - name: Build release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          flutter build apk --release \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            --dart-define=PUBLIC_SITE_URL="${{ env.PUBLIC_SITE_URL }}"

      - name: Build release AAB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          flutter build appbundle --release \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            --dart-define=PUBLIC_SITE_URL="${{ env.PUBLIC_SITE_URL }}"

      - name: Verify APK and AAB release identity
        run: |
          set -euo pipefail
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          AAB_SRC="build/app/outputs/bundle/release/app-release.aab"
          test -f "$APK_SRC"
          test -f "$AAB_SRC"

          BUNDLETOOL_JAR="bundletool-all-${BUNDLETOOL_VERSION}.jar"
          curl -fsSLo "$BUNDLETOOL_JAR" \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/${BUNDLETOOL_JAR}"
          echo "${BUNDLETOOL_SHA256}  ${BUNDLETOOL_JAR}" | sha256sum --check --strict
          java -jar "$BUNDLETOOL_JAR" validate --bundle="$AAB_SRC"

          AAB_PACKAGE="$(java -jar "$BUNDLETOOL_JAR" dump manifest \
            --bundle="$AAB_SRC" --xpath=/manifest/@package)"
          AAB_VERSION_CODE="$(java -jar "$BUNDLETOOL_JAR" dump manifest \
            --bundle="$AAB_SRC" --xpath=/manifest/@android:versionCode)"
          AAB_TARGET_SDK="$(java -jar "$BUNDLETOOL_JAR" dump manifest \
            --bundle="$AAB_SRC" --xpath=/manifest/uses-sdk/@android:targetSdkVersion)"

          test "$AAB_PACKAGE" = "$EXPECTED_PACKAGE"
          test "$AAB_VERSION_CODE" = "${{ steps.version.outputs.build_number }}"
          test "$AAB_TARGET_SDK" -ge 35

          # The upload certificate is intentionally self-signed. Verify the JAR
          # signature, then enforce its exact fingerprint below. Current JDK 17
          # can return 1 for a Gradle-built AAB after printing "jar verified."
          # because JarInputStream requires signature metadata to be first. The
          # bundle is consumed as a ZIP by bundletool, which was validated above.
          # Accept only that known ordering warning; never accept an unsigned,
          # digest-invalid, or otherwise unverifiable bundle.
          JARSIGNER_LOG="aab-jarsigner-verify.log"
          set +e
          jarsigner -verify "$AAB_SRC" > "$JARSIGNER_LOG" 2>&1
          JARSIGNER_STATUS=$?
          set -e

          if ! grep -Fxq 'jar verified.' "$JARSIGNER_LOG"; then
            cat "$JARSIGNER_LOG"
            echo "AAB JAR signature was not verified."
            exit 1
          fi
          if grep -Eiq \
            'jar is unsigned|unsigned entr|digest error|invalid signature|securityexception|unable to open jar|not parsable' \
            "$JARSIGNER_LOG"; then
            cat "$JARSIGNER_LOG"
            echo "AAB JAR signature verification reported a dangerous condition."
            exit 1
          fi
          if [ "$JARSIGNER_STATUS" -ne 0 ]; then
            test "$JARSIGNER_STATUS" -eq 1
            grep -Fq \
              'This JAR file contains internal inconsistencies that may result in different contents when reading via JarFile and JarInputStream:' \
              "$JARSIGNER_LOG"
            grep -Fq 'Manifest is missing when reading via JarInputStream' "$JARSIGNER_LOG"
            grep -Fq 'is signed in JarFile but is not signed in JarInputStream' "$JARSIGNER_LOG"
            echo "AAB signature verified; accepted the known JarInputStream entry-order warning."
          fi
          rm -f "$JARSIGNER_LOG"

          AAB_CERT_DETAILS="$(keytool -printcert -jarfile "$AAB_SRC")"
          AAB_CERT_SHA256="$(printf '%s\n' "$AAB_CERT_DETAILS" \
            | awk -F': ' '/SHA256:/{gsub(":", "", $2); print tolower($2)}')"
          test "$AAB_CERT_SHA256" = "$EXPECTED_UPLOAD_CERT_SHA256"

          BUILD_TOOLS_DIR="$(find "$ANDROID_SDK_ROOT/build-tools" \
            -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -n "$BUILD_TOOLS_DIR"
          APK_BADGING="$("$BUILD_TOOLS_DIR/aapt" dump badging "$APK_SRC")"
          APK_PACKAGE="$(printf '%s\n' "$APK_BADGING" \
            | sed -n "s/^package: name='\([^']*\)'.*/\1/p")"
          APK_VERSION_CODE="$(printf '%s\n' "$APK_BADGING" \
            | sed -n "s/.* versionCode='\([^']*\)'.*/\1/p")"
          APK_CERT_SHA256="$("$BUILD_TOOLS_DIR/apksigner" verify --print-certs "$APK_SRC" \
            | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
            | tr '[:upper:]' '[:lower:]' | tr -d ':')"

          test "$APK_PACKAGE" = "$EXPECTED_PACKAGE"
          test "$APK_VERSION_CODE" = "${{ steps.version.outputs.build_number }}"
          test "$APK_CERT_SHA256" = "$EXPECTED_UPLOAD_CERT_SHA256"
          test "$APK_CERT_SHA256" = "$AAB_CERT_SHA256"

          {
            echo "- package: \`$AAB_PACKAGE\`"
            echo "- targetSdk: \`$AAB_TARGET_SDK\`"
            echo "- upload certificate SHA-256: \`$AAB_CERT_SHA256\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare artifact files
        run: |
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          AAB_SRC="build/app/outputs/bundle/release/app-release.aab"
          test -f "$APK_SRC"
          test -f "$AAB_SRC"
          mkdir -p dist
          cp "$APK_SRC" dist/app-release.apk
          cp "$AAB_SRC" dist/app-release.aab
          (
            cd dist
            sha256sum app-release.apk > app-release.apk.sha256
            sha256sum app-release.aab > app-release.aab.sha256
            sha256sum --check --strict app-release.apk.sha256 app-release.aab.sha256
            {
              echo "- APK SHA-256: \`$(cut -d' ' -f1 app-release.apk.sha256)\`"
              echo "- AAB SHA-256: \`$(cut -d' ' -f1 app-release.aab.sha256)\`"
            } >> "$GITHUB_STEP_SUMMARY"
          )

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: vixrex-android-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}-${{ steps.version.outputs.short_sha }}
          path: |
            dist/app-release.apk
            dist/app-release.apk.sha256
          retention-days: 14
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v6
        with:
          name: vixrex-play-aab-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}-${{ steps.version.outputs.short_sha }}
          path: |
            dist/app-release.aab
            dist/app-release.aab.sha256
          retention-days: 14
          if-no-files-found: error

      - name: Cleanup signing files
        if: always()
        run: |
          rm -f \
            android/key.properties \
            android/app/upload-keystore.jks \
            aab-jarsigner-verify.log \
            "bundletool-all-${BUNDLETOOL_VERSION}.jar"
